name: Integration tests

# Runs the full test suite against a REAL SQL Server so the tenant-isolation / row-level-security and
# audit-chain guarantees are actually exercised (the CI build in ci.yml runs on windows-latest without SQL,
# where the integration tests skip). Separate workflow so it never touches the build or the release pipeline.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  integration:
    runs-on: ubuntu-latest

    services:
      sql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          # Ephemeral throwaway password for a container that is only reachable inside this job and destroyed
          # afterwards — it protects nothing. Swap for ${{ secrets.CI_MSSQL_SA_PASSWORD }} if you prefer.
          MSSQL_SA_PASSWORD: "Str0ngCiP4ss_2026x"
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        # Wait until SQL Server answers queries before the job steps run (the tools18 sqlcmd ships in the 2022
        # image; -C trusts the self-signed cert, -b fails the probe on error).
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Str0ngCiP4ss_2026x -C -Q 'SELECT 1' -b"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 30s

    env:
      # The test bootstrap (TestDatabaseSetup) migrates the schema and provisions the amkeyward_app login as
      # SA; CI=true makes an unreachable database FAIL the build instead of silently skipping.
      ConnectionStrings__Keyward: "Server=localhost,1433;Database=amkeyward;User Id=sa;Password=Str0ngCiP4ss_2026x;Encrypt=False;TrustServerCertificate=True"
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Am.Keyward.slnx

      - name: Build
        run: dotnet build Am.Keyward.slnx -c Release --no-restore

      - name: Integration tests (real SQL Server)
        run: dotnet test tests/Am.Keyward.Tests/Am.Keyward.Tests.csproj -c Release --no-build --logger "console;verbosity=normal"
