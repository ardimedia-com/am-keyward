name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Am.Keyward.slnx

      - name: Build
        run: dotnet build Am.Keyward.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Am.Keyward.slnx -c Release --no-build
