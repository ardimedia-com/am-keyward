name: Release

# Tag-driven release. Push a v* tag (e.g. v0.1.0-preview) on a release-prep commit that has already promoted
# the matching "## [<version>]" CHANGELOG section. The job builds + tests, packs the libraries and pushes
# them to nuget.org via Trusted Publishing (OIDC — no long-lived API key), then publishes a GitHub Release
# whose notes ARE that CHANGELOG section.
# Setup (once): create a Trusted Publishing policy on nuget.org for this repo + workflow, and set the repo
# Actions variable NUGET_USER to the nuget.org account username that owns the policy. No secret needed.
on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write   # OIDC token for NuGet Trusted Publishing

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        shell: bash
        run: |
          # The full tag (minus the leading 'v') IS the package version, e.g. 0.1.0-preview.
          echo "TAG_LABEL=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # Fail fast (before the build) if a tagged release has no matching CHANGELOG section, so a forgotten
      # promotion blocks the release instead of publishing stale notes.
      - name: Verify CHANGELOG has an entry for this release
        shell: bash
        run: |
          if ! grep -qF "## [${TAG_LABEL}]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [${TAG_LABEL}]' section. Promote [Unreleased] to '## [${TAG_LABEL}] - <date>' before tagging."
            exit 1
          fi
          echo "CHANGELOG.md has a section for ${TAG_LABEL}."

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Am.Keyward.slnx

      - name: Build
        run: dotnet build Am.Keyward.slnx -c Release --no-restore -p:Version=${{ env.TAG_LABEL }}

      # Integration tests skip (Inconclusive) when no SQL Server is reachable, so this stays green on CI.
      - name: Test
        run: dotnet test Am.Keyward.slnx -c Release --no-build

      # Pack the publishable libraries (the shell app + tests set IsPackable=false) and push to nuget.org.
      # Symbol packages (.snupkg) are pushed alongside automatically. --skip-duplicate makes a re-run safe.
      - name: Pack
        run: dotnet pack Am.Keyward.slnx -c Release --no-build -p:Version=${{ env.TAG_LABEL }} -o artifacts

      # Trusted Publishing: exchange the GitHub OIDC token for a short-lived, single-use nuget.org API key.
      - name: NuGet login (Trusted Publishing)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to nuget.org
        shell: bash
        run: |
          dotnet nuget push "artifacts/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --skip-duplicate

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          # Mark pre-1.0 (0.x) and alpha/beta/rc/preview tags as prereleases.
          IS_PRERELEASE=""
          if echo "$TAG_LABEL" | grep -qE "^0\.|alpha|beta|rc|preview"; then
            IS_PRERELEASE="--prerelease"
          fi

          # Release notes are the matching CHANGELOG section: the body between "## [<version>]" and the next
          # "## [" header. The guard above guarantees it exists.
          awk -v ver="## [${TAG_LABEL}]" 'index($0, ver) == 1 { f = 1; next } /^## \[/ { if (f) exit } f { print }' CHANGELOG.md > RELEASE_NOTES.md

          if [ -s RELEASE_NOTES.md ]; then
            NOTES_ARG=(--notes-file RELEASE_NOTES.md)
          else
            NOTES_ARG=(--generate-notes)
          fi

          gh release create "$GITHUB_REF_NAME" \
            --title "AM KEYWARD $TAG_LABEL" \
            "${NOTES_ARG[@]}" \
            $IS_PRERELEASE
